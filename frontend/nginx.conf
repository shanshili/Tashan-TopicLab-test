events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    client_max_body_size 5m;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        location = / {
            return 302 $scheme://$http_host/topic-lab/;
        }

        # Auth API -> topiclab-backend (account service)
        location /topic-lab/api/auth/ {
            proxy_pass http://topiclab-backend:8000/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Source feed bridge -> topiclab-backend
        location /topic-lab/api/source-feed/ {
            proxy_pass http://topiclab-backend:8000/source-feed/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Other APIs -> Resonnet backend
        location /topic-lab/api/ {
            proxy_pass http://backend:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # SSE / long-running agent streaming support
            proxy_buffering            off;
            proxy_cache                off;
            proxy_read_timeout         600s;
            proxy_send_timeout         600s;
            chunked_transfer_encoding  on;
            proxy_set_header           Connection '';
            proxy_http_version         1.1;
        }

        location /topic-lab/ {
            alias /usr/share/nginx/html/;
            try_files $uri $uri/ /topic-lab/index.html;
        }

        location = /topic-lab {
            return 302 $scheme://$http_host/topic-lab/;
        }

        location = /index.html {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            expires 0;
        }
    }
}
